      const addToCart = (product, selectedExtrasArray) => {
        const extraIds = selectedExtrasArray.map(e => e.id).sort().join(',');
        const cartKey = `${product.id}-${extraIds}`;
        const existing = cart.find(item => item.cartKey === cartKey);
        const qtyInCart = cart.filter(item => item.id === product.id).reduce((sum, item) => sum + item.qty, 0);

        if (!product.isUnlimited && qtyInCart >= product.stock) {
          setDialog({ type: 'alert', title: 'Stok Terbatas', message: `Maksimal stok yang bisa dibeli adalah ${product.stock}.` }); return;
        }

        if (existing) {
          setCart(cart.map(item => item.cartKey === cartKey ? { ...item, qty: item.qty + 1 } : item));
        } else {
          const extraPriceSum = selectedExtrasArray.reduce((sum, e) => sum + e.price, 0);
          setCart([...cart, { ...product, cartKey, qty: 1, selectedExtras: selectedExtrasArray, finalItemPrice: product.price + extraPriceSum }]);
        }
        setIsSelectExtraModalOpen(false);
      };

      const removeFromCart = (cartKey) => {
        const existing = cart.find(item => item.cartKey === cartKey);
        if (existing.qty === 1) setCart(cart.filter(item => item.cartKey !== cartKey));
        else setCart(cart.map(item => item.cartKey === cartKey ? { ...item, qty: item.qty - 1 } : item));
      };

      const cartSubtotal = cart.reduce((sum, item) => sum + (item.finalItemPrice * item.qty), 0);
      let discountAmount = 0;
      if (activeDiscount) {
        if (activeDiscount.type === 'percentage') discountAmount = (cartSubtotal * activeDiscount.value) / 100;
        else discountAmount = activeDiscount.value;
      }
      const totalCart = Math.max(0, cartSubtotal - discountAmount);

      const handlePreCheckout = () => {
        if (cart.length === 0) return;
        setAmountReceived(totalCart.toString()); setIsCheckoutModalOpen(true);
      };

      const processCheckout = () => {
        if (cart.length === 0) return;
        const received = Number(amountReceived) || 0;
        if (selectedPayment === 'cash' && received < totalCart) {
          setDialog({ type: 'alert', title: 'Uang Kurang', message: 'Nominal uang yang diterima kurang dari total tagihan!' }); return;
        }

        const updatedProducts = products.map(p => {
          if (p.isUnlimited) return p;
          const qtyInCart = cart.filter(c => c.id === p.id).reduce((sum, c) => sum + c.qty, 0);
          return qtyInCart > 0 ? { ...p, stock: p.stock - qtyInCart } : p;
        });
        
        const totalCost = cart.reduce((sum, item) => sum + (item.cost * item.qty), 0);
        const newTx = {
          id: Date.now(),
          date: new Date().toLocaleString(),
          items: cart, subtotal: cartSubtotal, discountApp: activeDiscount, discountAmount: discountAmount,
          total: totalCart, profit: totalCart - totalCost, paymentMethod: selectedPayment,
          receivedAmount: selectedPayment === 'cash' ? received : totalCart, changeAmount: selectedPayment === 'cash' ? received - totalCart : 0
        };
        
        const newTxList = [newTx, ...transactions];
        
        // Simpan ke DB Server
        updateDB('products', updatedProducts);
        updateDB('transactions', newTxList);
        
        // Reset lokal
        setCart([]); setActiveDiscount(null); setIsCheckoutModalOpen(false); setAmountReceived('');
        setDialog({ type: 'alert', title: 'Transaksi Berhasil', message: selectedPayment === 'cash' ? `Kembalian: Rp ${(received - totalCart).toLocaleString()}` : 'Pembayaran Non-Tunai Berhasil.' });
      };

      const handleAddExpense = (e) => {
        e.preventDefault();
        if (!expenseInput.desc || !expenseInput.amount) return;
        const newExp = [{ id: Date.now(), date: new Date().toLocaleString(), desc: expenseInput.desc, amount: parseInt(expenseInput.amount) }, ...expenses];
        updateDB('expenses', newExp);
        setExpenseInput({ desc: '', amount: '' });
      };

      // Filter data HANYA untuk shift yang sedang berjalan saat ini
      const currentShiftTransactions = transactions.filter(tx => tx.id >= shiftStartTime);
      const currentShiftExpenses = expenses.filter(exp => exp.id >= shiftStartTime);

      const shiftSalesCash = currentShiftTransactions.filter(tx => tx.paymentMethod === 'cash').reduce((sum, tx) => sum + tx.total, 0);
      const shiftSalesNonCash = currentShiftTransactions.filter(tx => tx.paymentMethod !== 'cash').reduce((sum, tx) => sum + tx.total, 0);
      const shiftTotalSales = shiftSalesCash + shiftSalesNonCash;
      const shiftTotalPengeluaran = currentShiftExpenses.reduce((sum, exp) => sum + exp.amount, 0);
      const estimasiUangLaci = modalAwal + shiftSalesCash - shiftTotalPengeluaran;

      const closeShiftWA = () => {
        let text = `*LAPORAN TUTUP SHIFT*%0AKasir: ${cashierName}%0ATanggal: ${new Date().toLocaleDateString()}%0A%0A*RINGKASAN PENJUALAN*%0ATotal Penjualan: Rp ${shiftTotalSales.toLocaleString()}%0A- Tunai: Rp ${shiftSalesCash.toLocaleString()}%0A- Non-Tunai (QRIS/dll): Rp ${shiftSalesNonCash.toLocaleString()}%0A%0A*ARUS KAS LACI*%0AModal Awal: Rp ${modalAwal.toLocaleString()}%0ATotal Pengeluaran: Rp ${shiftTotalPengeluaran.toLocaleString()}%0A*Estimasi Kas Fisik (Laci): Rp ${estimasiUangLaci.toLocaleString()}*%0A%0A*DETAIL PENGELUARAN*%0A`;
        if (currentShiftExpenses.length === 0) text += `- Nihil%0A`;
        currentShiftExpenses.forEach(exp => { text += `- ${exp.desc}: Rp ${exp.amount.toLocaleString()}%0A`; });
        
        window.open(`https://wa.me/?text=${text}`, '_blank');
        setDialog({
          type: 'confirm', title: 'Tutup Shift', message: 'Apakah Anda yakin ingin menutup shift? Tindakan ini akan mereset laci untuk shift berikutnya.',

            updateDB('cashierName', '');

          }

        let updatedList;

        updateDB('extras', newList); setIsExtraModalOpen(false);
      };
      const handleDeleteExtra = (id) => { setDialog({ type: 'confirm', title: 'Hapus Ekstra', message: 'Yakin hapus opsi ekstra?', onConfirm: () => { const newEx = extras.filter(ex => ex.id !== id); updateDB('extras', newEx); } }); };

      const handleDeleteAdminExpense = (id) => { setDialog({ type: 'confirm', title: 'Hapus Pengeluaran', message: 'Yakin menghapus ini?', onConfirm: () => { const newAE = adminExpenses.filter(exp => exp.id !== id); updateDB('adminExpenses', newAE); } }); };
      const togglePaymentMethod = (id) => { const newPM = paymentMethods.map(pm => pm.id === id ? { ...pm, active: !pm.active } : pm); updateDB('paymentMethods', newPM); };

      const handleCancelTransaction = (txId) => {

          type: 'confirm', title: 'Batalkan Transaksi', message: 'Yakin ingin membatalkan transaksi ini? Stok barang akan dikembalikan ke rak.',

            const txToCancel = transactions.find(t => t.id === txId);
            if (!txToCancel) return;
            const updatedProducts = products.map(p => {
              const itemInTx = txToCancel.items.find(item => item.id === p.id);
              if (itemInTx && !p.isUnlimited) return { ...p, stock: p.stock + itemInTx.qty };
              return p;
            });
            updateDB('products', updatedProducts);
            const newTx = transactions.filter(t => t.id !== txId); updateDB('transactions', newTx);
            setTimeout(() => setDialog({ type: 'alert', title: 'Berhasil', message: 'Transaksi dibatalkan. Laporan & stok telah diperbarui.' }), 100);
          }
        });
      };

      const exportToCSV = () => {
        const headers = ['ID,Nama Barang,Kategori,Sisa Stok,Harga Modal,Harga Jual,Total Nilai Aset'];
        const rows = products.map(p => `${p.id},"${p.name}","${p.category || 'Umum'}",${p.isUnlimited ? '"Tak Terbatas"' : p.stock},${p.cost},${p.price},${p.isUnlimited ? 0 : p.stock * p.cost}`);
        const csvContent = "data:text/csv;charset=utf-8," + headers.concat(rows).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri); link.setAttribute("download", `Stok_Opname_${new Date().toLocaleDateString('id-ID')}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleRestoreDataCSV = () => {
        setDialog({
          type: 'confirm',
          title: 'Pulihkan Data CSV',
          message: 'Aksi ini akan memasukkan 26 data barang (Mie Goreng, Nutrisari, dll) dari file CSV ke dalam database Firebase. Lanjutkan?',
          onConfirm: () => {
            updateDB('products', importedProducts);
            updateDB('categories', importedCategories);
            setTimeout(() => setDialog({ type: 'alert', title: 'Berhasil', message: '26 Barang berhasil dimasukkan ke Firebase!' }), 100);
          }
        });
      };

      // Kalkulasi Bulanan
      const filteredTx = transactions.filter(tx => new Date(tx.id).toISOString().slice(0, 7) === selectedMonth);
      const filteredExpenses = expenses.filter(exp => new Date(exp.id).toISOString().slice(0, 7) === selectedMonth);
      const filteredAdminExpenses = adminExpenses.filter(exp => new Date(exp.id).toISOString().slice(0, 7) === selectedMonth);

      const monthlyRevenue = filteredTx.reduce((sum, tx) => sum + tx.total, 0);
      const monthlyGrossProfit = filteredTx.reduce((sum, tx) => sum + tx.profit, 0);
      const monthlyCashRevenue = filteredTx.filter(tx => tx.paymentMethod === 'cash').reduce((sum, tx) => sum + tx.total, 0);
      const monthlyNonCashRevenue = filteredTx.filter(tx => tx.paymentMethod !== 'cash').reduce((sum, tx) => sum + tx.total, 0);
      
      const monthlyShiftExpenses = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);
      const monthlyAdminTotalExpenses = filteredAdminExpenses.reduce((sum, exp) => sum + exp.amount, 0);
      const totalFixedCosts = fixedCosts.reduce((sum, fc) => sum + fc.amount, 0);
      
      const monthlyNetProfit = monthlyGrossProfit - monthlyShiftExpenses - monthlyAdminTotalExpenses - totalFixedCosts;
      const profitToShare = monthlyNetProfit; 
      const totalInvestorPct = investors.reduce((sum, inv) => sum + inv.sharePct, 0);
      const staffPct = Math.max(0, 100 - totalInvestorPct);
      const staffShare = (profitToShare * staffPct) / 100;

      // --- FUNGSI TUTUP BUKU BULANAN ADMIN ---
      const handleTutupBukuBulanan = () => {
        let text = `*LAPORAN TUTUP BUKU BULANAN*%0A`;
        text += `Periode: ${selectedMonth}%0A%0A`;
        text += `*RINGKASAN PENDAPATAN*%0A`;
        text += `- Omzet Kotor: Rp ${monthlyRevenue.toLocaleString()}%0A`;
        text += `- Profit Kotor (Margin): Rp ${monthlyGrossProfit.toLocaleString()}%0A%0A`;
        text += `*POTONGAN PENGELUARAN*%0A`;
        text += `- Pengeluaran Shift Kasir: Rp ${monthlyShiftExpenses.toLocaleString()}%0A`;
        text += `- Belanja Restock Admin: Rp ${monthlyAdminTotalExpenses.toLocaleString()}%0A`;
        text += `- Pengeluaran Tetap (Fixed): Rp ${totalFixedCosts.toLocaleString()}%0A%0A`;
        text += `*KEUNTUNGAN BERSIH (NET PROFIT)*%0A`;
        text += `*Total: ${monthlyNetProfit >= 0 ? 'Rp ' : '- Rp '}${Math.abs(monthlyNetProfit).toLocaleString()}*%0A%0A`;
        text += `*RINCIAN BAGI HASIL*%0A`;
        investors.forEach(inv => {
          const invShare = (profitToShare * inv.sharePct) / 100;
          text += `- ${inv.name} (${inv.sharePct}%): ${invShare >= 0 ? 'Rp ' : '- Rp '}${Math.abs(invShare).toLocaleString()}%0A`;
        });
        text += `- Pengelola/Staff (${staffPct}%): ${staffShare >= 0 ? 'Rp ' : '- Rp '}${Math.abs(staffShare).toLocaleString()}%0A%0A`;
        text += `_Laporan dihasilkan otomatis oleh Kasir Pintar_`;
        
        window.open(`https://wa.me/?text=${text}`, '_blank');
      };

      // --- TAMPILAN UI ---

            </div>
            {renderDialog()}
          </div>

      }

      if (view === 'pin') { 
        return (
          <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm text-center">
              <div className="flex justify-center mb-4"><div className={`p-4 rounded-full text-white ${targetRole === 'admin' ? 'bg-slate-800' : 'bg-blue-600'}`}><Icons.Lock size={32} /></div></div>
              <h2 className="text-xl font-bold text-gray-800 mb-1">Masukkan PIN {targetRole === 'admin' ? 'Admin' : 'Kasir'}</h2>
              <p className="text-sm text-gray-500 mb-6">Untuk keamanan aplikasi</p>
              <div className="flex justify-center mb-6"><input type="password" readOnly value={pinInput} className={`w-full text-center text-3xl tracking-widest font-bold py-3 border-b-2 outline-none bg-transparent ${errorPin ? 'border-red-500 text-red-500' : 'border-gray-300'}`} placeholder="••••"/></div>
              {errorPin && <p className="text-red-500 text-sm mb-4 font-semibold animate-bounce">PIN Salah! Coba lagi.</p>}
              <div className="grid grid-cols-3 gap-3 mb-6">

                    {productSubTab === 'diskon' && (
                      <div>
                        <div className="flex justify-between items-center mb-6">
                          <div>
                            <h3 className="text-xl font-bold text-gray-800">Manajemen Promo & Diskon</h3>
                            <p className="text-sm text-gray-500">Diskon ini bisa dipilih kasir untuk memotong total tagihan belanja.</p>
                          </div>
                          <button onClick={() => { setEditingDiscount(null); setDiscountForm({name:'', type:'percentage', value:''}); setIsDiscountModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 flex items-center text-sm shadow-sm active:scale-95 transition-transform"><Icons.Plus size={16} className="mr-1"/> Buat Promo</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {discounts.length === 0 ? <p className="text-gray-400 text-sm">Belum ada diskon aktif.</p> : discounts.map(d => (
                            <div key={d.id} className="p-4 border rounded-xl shadow-sm flex justify-between items-center bg-white">
                              <div>
                                <p className="font-bold text-gray-800 flex items-center"><Icons.Percent size={14} className="mr-1 text-orange-500"/> {d.name}</p>
                                <p className="text-sm text-orange-600 font-semibold mt-1">Potongan: {d.type === 'percentage' ? `${d.value}% dari total` : `Rp ${d.value.toLocaleString()}`}</p>
                              </div>
                              <div className="flex gap-2">
                                <button onClick={() => { setEditingDiscount(d.id); setDiscountForm({name: d.name, type: d.type, value: d.value}); setIsDiscountModalOpen(true); }} className="text-gray-400 hover:text-blue-600 bg-gray-50 p-2 rounded border active:scale-95 transition-all"><Icons.Edit size={16} /></button>
                                <button onClick={() => handleDeleteDiscount(d.id)} className="text-gray-400 hover:text-red-600 bg-red-50 p-2 rounded border active:scale-95 transition-all"><Icons.X size={16} /></button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {productSubTab === 'stok' && (
                      <div>
                        <h3 className="text-xl font-bold text-gray-800 mb-6">Penyesuaian Stok Cepat</h3>
                        <div className="space-y-4">
                          {products.map(p => (
                            <div key={p.id} className="flex justify-between items-center p-4 border rounded-xl hover:shadow-sm transition-shadow">
                              <div><h4 className="font-bold text-gray-800 text-lg">{p.name}</h4><p className="text-sm text-gray-500">Harga Jual: Rp {p.price.toLocaleString()}</p></div>
                              <div className="flex items-center gap-4">
                                <span className={`font-bold px-3 py-1 rounded-full text-sm ${p.isUnlimited ? 'bg-purple-100 text-purple-700' : (p.stock < 10 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700')}`}>{p.isUnlimited ? 'Titipan / ∞' : `Sisa: ${p.stock}`}</span>
                                {!p.isUnlimited && (
                                  <div className="flex items-center bg-gray-100 rounded-lg p-1">
                                    <button onClick={() => updateStock(p.id, -1)} className="p-2 bg-white rounded shadow-sm text-gray-600 hover:text-red-600 active:scale-95"><Icons.Minus size={18}/></button>
                                    <span className="w-12 text-center font-bold">{p.stock}</span>
                                    <button onClick={() => updateStock(p.id, 1)} className="p-2 bg-white rounded shadow-sm text-gray-600 hover:text-green-600 active:scale-95"><Icons.Plus size={18}/></button>
                                  </div>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {productSubTab === 'opname' && (
                      <div>
                        <div className="flex justify-between items-center mb-6">
                          <div><h3 className="text-xl font-bold text-gray-800">Laporan Stok Opname</h3><p className="text-sm text-gray-500">Rekapitulasi nilai aset dan stok barang saat ini.</p></div>
                          <button onClick={exportToCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-700 flex items-center text-sm shadow-sm active:scale-95 transition-transform"><Icons.Download size={16} className="mr-2"/> Download Excel</button>
                        </div>
                        <div className="bg-green-50 border border-green-200 p-4 rounded-xl mb-6 flex justify-between items-center shadow-sm"><span className="font-bold text-green-800">Total Nilai Aset (Modal Barang Tersisa):</span><span className="text-2xl font-bold text-green-700">Rp {products.reduce((sum, p) => sum + (p.isUnlimited ? 0 : p.stock * p.cost), 0).toLocaleString()}</span></div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse border rounded-lg bg-white shadow-sm">
                            <thead><tr className="bg-gray-100 border-b"><th className="p-3 text-sm font-semibold text-gray-600">Nama Barang</th><th className="p-3 text-sm font-semibold text-gray-600">Sisa Stok</th><th className="p-3 text-sm font-semibold text-gray-600">Nilai Per Item (Modal)</th><th className="p-3 text-sm font-semibold text-gray-600 text-right">Total Nilai Aset</th></tr></thead>
                            <tbody>{products.map(p => (<tr key={p.id} className="border-b hover:bg-gray-50"><td className="p-3 font-semibold text-gray-800">{p.name}</td><td className="p-3 text-sm text-gray-700 font-bold bg-gray-50 text-center w-24">{p.isUnlimited ? '∞' : p.stock}</td><td className="p-3 text-sm text-gray-500">Rp {p.cost.toLocaleString()}</td><td className="p-3 text-sm font-bold text-green-700 text-right">Rp {(p.isUnlimited ? 0 : p.stock * p.cost).toLocaleString()}</td></tr>))}</tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* --- ADMIN MODALS RENDERED SAFELY AT THE END OF THE CONTAINER --- */}
            {isProductModalOpen && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                  <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">{editingProduct ? 'Edit Barang' : 'Tambah Barang Baru'}</h3>
                    <button onClick={() => setIsProductModalOpen(false)} className="text-gray-400 hover:text-red-500"><Icons.X size={20}/></button>
                  </div>
                  <form onSubmit={handleSaveProduct} className="p-6 space-y-4">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Nama Barang</label><input type="text" required value={productForm.name} onChange={e => setProductForm({...productForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Contoh: Es Teh Manis" /></div>
                    <div className="flex items-center p-3 bg-purple-50 rounded-xl border border-purple-100">
                        <input type="checkbox" id="isUnlimited" checked={productForm.isUnlimited} onChange={e => setProductForm({...productForm, isUnlimited: e.target.checked, stock: e.target.checked ? '' : productForm.stock})} className="w-5 h-5 text-purple-600 rounded mr-3"/>
                        <label htmlFor="isUnlimited" className="text-sm font-bold text-purple-800 cursor-pointer">Barang Titipan (Stok Tak Terbatas)</label>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Kategori</label><select value={productForm.category} onChange={e => setProductForm({...productForm, category: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 bg-white">{categories.map((cat, idx) => (<option key={idx} value={cat}>{cat}</option>))}</select></div>
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Stok Awal</label><input type="number" required={!productForm.isUnlimited} disabled={productForm.isUnlimited} min="0" value={productForm.isUnlimited ? '' : productForm.stock} onChange={e => setProductForm({...productForm, stock: e.target.value})} className={`w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 ${productForm.isUnlimited ? 'bg-gray-100 cursor-not-allowed' : ''}`} placeholder={productForm.isUnlimited ? "Tak Terbatas" : "0"}/></div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Harga Modal (Rp)</label><input type="number" required min="0" value={productForm.cost} onChange={e => setProductForm({...productForm, cost: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="0"/></div>
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Harga Jual (Rp)</label><input type="number" required min="0" value={productForm.price} onChange={e => setProductForm({...productForm, price: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="0"/></div>
                    </div>
                    <div className="pt-4 mt-2 flex justify-end gap-3"><button type="button" onClick={() => setIsProductModalOpen(false)} className="px-5 py-3 text-gray-600 font-bold hover:bg-gray-100 rounded-xl">Batal</button><button type="submit" className="px-5 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Simpan Barang</button></div>
                  </form>
                </div>
              </div>
            )}

            {isExtraModalOpen && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                  <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">{editingExtra ? 'Edit Ekstra' : 'Tambah Opsi Ekstra'}</h3>
                    <button onClick={() => setIsExtraModalOpen(false)} className="text-gray-400 hover:text-red-500"><Icons.X size={20}/></button>
                  </div>
                  <form onSubmit={handleSaveExtra} className="p-6 space-y-4">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Nama Opsi</label><input autoFocus type="text" required value={extraForm.name} onChange={e => setExtraForm({...extraForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Contoh: Tambah Susu Kental" /></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Harga Tambahan (Rp)</label><input type="number" required min="0" value={extraForm.price} onChange={e => setExtraForm({...extraForm, price: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Misal: 3000"/></div>
                    <div className="pt-4 mt-6 flex justify-end gap-3"><button type="button" onClick={() => setIsExtraModalOpen(false)} className="px-5 py-3 text-gray-600 font-bold hover:bg-gray-100 rounded-xl">Batal</button><button type="submit" className="px-5 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Simpan Opsi</button></div>
                  </form>
                </div>
              </div>
            )}

            {isDiscountModalOpen && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                  <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">{editingDiscount ? 'Edit Promo/Diskon' : 'Buat Promo Baru'}</h3>
                    <button onClick={() => setIsDiscountModalOpen(false)} className="text-gray-400 hover:text-red-500"><Icons.X size={20}/></button>
                  </div>
                  <form onSubmit={handleSaveDiscount} className="p-6 space-y-4">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Nama Promo</label><input autoFocus type="text" required value={discountForm.name} onChange={e => setDiscountForm({...discountForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Contoh: Diskon Mahasiswa" /></div>
                    <div className="grid grid-cols-2 gap-4">
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Jenis Diskon</label><select value={discountForm.type} onChange={e => setDiscountForm({...discountForm, type: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 bg-white"><option value="percentage">Persentase (%)</option><option value="nominal">Nominal (Rp)</option></select></div>
                      <div><label className="block text-sm font-bold text-gray-700 mb-1">Nilai Potongan</label><input type="number" required min="1" max={discountForm.type === 'percentage' ? 100 : undefined} value={discountForm.value} onChange={e => setDiscountForm({...discountForm, value: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder={discountForm.type === 'percentage' ? "Maks 100" : "Rp"}/></div>
                    </div>
                    <div className="pt-4 mt-6 flex justify-end gap-3"><button type="button" onClick={() => setIsDiscountModalOpen(false)} className="px-5 py-3 text-gray-600 font-bold hover:bg-gray-100 rounded-xl">Batal</button><button type="submit" className="px-5 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Simpan Promo</button></div>
                  </form>
                </div>
              </div>
            )}

            {isInvestorModalOpen && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
                  <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">{editingInvestor ? 'Edit Investor' : 'Tambah Investor Baru'}</h3>
                    <button onClick={() => setIsInvestorModalOpen(false)} className="text-gray-400 hover:text-red-500"><Icons.X size={20}/></button>
                  </div>
                  <form onSubmit={handleSaveInvestor} className="p-6 space-y-4">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Nama Investor</label><input autoFocus type="text" required value={investorForm.name} onChange={e => setInvestorForm({...investorForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Contoh: Pak Budi" /></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Persentase Bagi Hasil (%)</label><input type="number" required min="1" max="100" value={investorForm.sharePct} onChange={e => setInvestorForm({...investorForm, sharePct: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Misal: 30" /></div>
                    <div className="pt-4 mt-6 flex justify-end gap-3"><button type="button" onClick={() => setIsInvestorModalOpen(false)} className="px-5 py-3 text-gray-600 font-bold hover:bg-gray-100 rounded-xl">Batal</button><button type="submit" className="px-5 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Simpan</button></div>
                  </form>
                </div>
              </div>
            )}

            {renderDialog()}
          </div>
        );
      }
      return null;
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
